blueprint:
  name: Aqara H2 EU Dimmer Switch (KD-R01D, Rotary Dial/Knob) - Helper - Color Control Mode Timeout Handler (Zigbee2MQTT/Z2M)
  description: |
    Companion blueprint for the core Blueprint "Aqara H2 EU Dimmer Switch (KD-R01D, Rotary Dial/Knob) - Advanced Light Control (Zigbee2MQTT/Z2M)". 
    This blueprint monitors if the dial is rotated and automatically resets your mode helper back to 'OFF' (Color Control Mode -> Brightness Control Mode) after a configurable duration of dial inactivity.
  domain: automation
  input:
    mqtt_topic:
      name: MQTT Topic
      description: The base topic of your H2 switch (e.g. zigbee2mqtt/Kitchen Dimmer Switch). Must match the core automation.
      selector:
        text:
    mode_helper:
      name: Mode Toggle Helper
      description: Select the same 'input_boolean' helper entity monitored by the core automation.
      selector:
        entity:
          filter:
            - domain: input_boolean
          multiple: false
    idle_timeout:
      name: Inactivity Timeout Duration
      description: Seconds to wait after the last rotation click before resetting the switch to standard Brightness mode.
      default: 10
      selector:
        number:
          min: 1
          max: 60
          step: 1
          unit_of_measurement: "s"

variables:
  helper_entity: !input mode_helper

trigger:
  - platform: mqtt
    topic: !input mqtt_topic

condition:
  - condition: template
    value_template: "{{ trigger.payload_json.action == 'rotation' }}"
  - condition: template
    value_template: "{{ is_state(helper_entity, 'on') }}"

action:
  - delay: !input idle_timeout
  - service: input_boolean.turn_off
    target:
      entity_id: "{{ helper_entity }}"

mode: restart